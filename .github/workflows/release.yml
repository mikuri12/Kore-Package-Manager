name: Release Tarball Manager

on:
  push:
    tags:
      - 'v*' # Se activa solo cuando publicas un Tag estilo "v1.2.0"

jobs:
  build-and-release:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Build Release Binary
        run: cargo build --release
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/tm
          name: Tarball Manager ${{ github.ref_name }}
          body: |
            ### 🚀 Nueva actualización de Tarball Manager
            Binary ejecutable listo para descargar en Linux.
            
            **Instalación Rápida:**
            ```bash
            chmod +x tm
            sudo mv tm /usr/local/bin/
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
