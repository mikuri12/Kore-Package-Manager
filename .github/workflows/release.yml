name: Release Kore Package Manager

on:
  push:
    tags:
      - 'v*' 

jobs:
  build-and-release:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Build Release Binary
        run: cargo build --release
      
      - name: Package Release Archive
        run: |
          mkdir -p kpm-release
          cp target/release/kpm kpm-release/
          cp assets/Ico/kore-logo.svg kpm-release/
          cp assets/kpm.desktop kpm-release/
          tar -czvf kpm-linux-x86_64.tar.gz -C kpm-release .
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: kpm-linux-x86_64.tar.gz
          name: Kore Package Manager ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ### Nueva actualización de Kore Package Manager
            Archivo comprimido con binario, ícono y acceso directo listos para usar en Linux.
            
            **Instalación Rápida:**
            ```bash
            tar -xzf kpm-linux-x86_64.tar.gz
            chmod +x kpm
            sudo mv kpm /usr/local/bin/
            
            # Opcional: Instalar el acceso directo (.desktop)
            mkdir -p ~/.local/share/icons ~/.local/share/applications
            cp kore-logo.svg ~/.local/share/icons/
            cp kpm.desktop ~/.local/share/applications/
            update-desktop-database ~/.local/share/applications
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
